name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: PYTHONPATH=src uv run pytest tests/ -v --ignore=tests/test_dispatch_live.py --ignore=tests/test_server_live.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - name: Check imports
        run: PYTHONPATH=src uv run python -c "from escape import escape_for_elisp; from dispatch import eval_in_emacs; from server import load_manifest_jsonl; print('imports ok')"
